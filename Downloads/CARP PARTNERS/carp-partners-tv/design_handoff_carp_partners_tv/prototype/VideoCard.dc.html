<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div onClick="{{ item.open }}" style="position:relative;width:100%;cursor:pointer;font-family:Inter,sans-serif;transition:transform .25s ease" style-hover="transform:translateY(-5px)">
  <div style="position:relative;width:100%;aspect-ratio:16/9;border-radius:11px;overflow:hidden;background:{{ item.bg }};border:1px solid rgba(255,255,255,0.07);box-shadow:0 6px 22px rgba(0,0,0,0.4)">
    <div style="position:absolute;inset:0;background:linear-gradient(180deg, rgba(0,0,0,0) 38%, rgba(4,8,10,0.82) 100%)"></div>
    <div style="position:absolute;inset:0;box-shadow:inset 0 1px 0 rgba(255,255,255,0.06)"></div>
    <sc-if value="{{ item.showNew }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:5px;padding:4px 8px;border-radius:6px;background:rgba(216,166,74,0.95);color:#1a1206;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase">{{ newLabel }}</div>
    </sc-if>
    <sc-if value="{{ item.showRank }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;left:8px;bottom:-12px;font-family:Sora,sans-serif;font-weight:800;font-size:96px;line-height:1;color:transparent;-webkit-text-stroke:2px rgba(255,255,255,0.5);text-shadow:0 2px 12px rgba(0,0,0,0.4)">{{ item.rank }}</div>
    </sc-if>
    <div style="position:absolute;top:10px;right:10px;padding:3px 7px;border-radius:5px;background:rgba(4,8,10,0.72);backdrop-filter:blur(4px);font-size:11px;color:#dfe7e3;font-variant-numeric:tabular-nums">{{ item.dur }}</div>
    <div style="position:absolute;right:12px;bottom:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.16);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.32)"><i class="ti ti-player-play-filled" style="font-size:16px;color:#fff;margin-left:1px"></i></div>
    <sc-if value="{{ item.showProgress }}" hint-placeholder-val="{{ false }}">
      <div style="position:absolute;left:0;right:0;bottom:0;height:4px;background:rgba(255,255,255,0.22)"><div style="height:100%;width:{{ item.progressPct }};background:{{ accent }}"></div></div>
    </sc-if>
  </div>
  <div style="padding:10px 2px 2px">
    <div style="font-size:13.5px;font-weight:600;color:#e9efeb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ item.title }}</div>
    <div style="font-size:11.5px;color:#85958e;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ item.metaline }}</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: {&quot;width&quot;: 300, &quot;height&quot;: 232},
  &quot;item&quot;: {&quot;editor&quot;: null, &quot;default&quot;: {&quot;title&quot;: &quot;Amanecer en el Ebro&quot;, &quot;metaline&quot;: &quot;Aguas Salvajes \u00b7 Ep 4&quot;, &quot;dur&quot;: &quot;34 min&quot;, &quot;bg&quot;: &quot;radial-gradient(120% 100% at 18% 0%, #2a4a52 0%, rgba(42,74,82,0) 55%), radial-gradient(120% 120% at 92% 100%, #163a3a 0%, rgba(22,58,58,0) 60%), linear-gradient(160deg, #0e1f24, #0a1518)&quot;, &quot;progressPct&quot;: &quot;62%&quot;, &quot;showProgress&quot;: true, &quot;showNew&quot;: false, &quot;showRank&quot;: false, &quot;rank&quot;: null}},
  &quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#2FA372&quot;},
  &quot;newLabel&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Nuevo&quot;},
  &quot;w&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;100%&quot;}
}"></script>
</body>
</html>
