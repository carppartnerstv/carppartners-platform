# =====================================================================
# Nginx — proxy inverso para Carp Partners TV.  (Briefing 7.2)
#
#   carppartners.tv/         -> build estático de Next.js (apps/web)
#   carppartners.tv/api/*    -> backend Node.js en :3001
#   carppartners.tv/admin    -> mismo build de Next.js (ruta protegida)
#
# Colócalo en /etc/nginx/sites-available/carppartners.tv y enlázalo a
# sites-enabled. El bloque SSL lo añade Certbot automáticamente:
#   sudo certbot --nginx -d carppartners.tv -d www.carppartners.tv
# =====================================================================

# Redirección HTTP -> HTTPS (Certbot suele añadir esto; se deja explícito)
server {
    listen 80;
    listen [::]:80;
    server_name carppartners.tv www.carppartners.tv;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name carppartners.tv www.carppartners.tv;

    # Certbot rellena ssl_certificate / ssl_certificate_key aquí.
    # ssl_certificate     /etc/letsencrypt/live/carppartners.tv/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/carppartners.tv/privkey.pem;

    client_max_body_size 25m;   # margen para uploads del panel admin

    # --- API: proxy al backend Node.js -------------------------------
    location /api/ {
        # Quitamos el prefijo /api antes de pasar al backend.
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Webhook de Stripe (sin reescritura, ruta /api/stripe/webhook)-
    # Se sirve por el mismo proxy /api/; Stripe apuntará a
    #   https://carppartners.tv/api/stripe/webhook

    # --- Frontend Next.js (web + /admin) -----------------------------
    # Next.js en modo standalone corre en :3000; Nginx hace proxy.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cabeceras de seguridad básicas
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
